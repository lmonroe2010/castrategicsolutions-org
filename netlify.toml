# Netlify build config for the Strategic Solutions, Inc. marketing site.
# Astro outputs static HTML to `dist/`. No serverless functions or redirects yet.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 requires Node >= 22.12 (see package.json engines field).
  NODE_VERSION = "22"
